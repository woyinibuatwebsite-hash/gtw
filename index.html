<!DOCTYPE html>
<html lang="id">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Arfy | Personal Website</title>

<meta name="description"
content="Website pribadi Arfy">

<meta name="theme-color"
content="#6d5dfc">

<link rel="preconnect"
href="https://fonts.googleapis.com">

<link rel="preconnect"
href="https://fonts.gstatic.com"
crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap"
rel="stylesheet">

<style>

/* ===================================
   ROOT
=================================== */

:root{

--bg:#f5f7fb;
--card:#ffffff;
--text:#202020;
--primary:#6d5dfc;
--secondary:#8b5cf6;
--border:#e5e7eb;

--shadow:
0 10px 30px rgba(
0,0,0,.12);

}

/* ===================================
   DARK MODE
=================================== */

.dark{

--bg:#0f172a;
--card:#1e293b;
--text:#ffffff;
--primary:#8b5cf6;
--secondary:#6d5dfc;
--border:#334155;

}

/* ===================================
   RESET
=================================== */

*{

margin:0;
padding:0;
box-sizing:border-box;

}

html{

scroll-behavior:smooth;

}

body{

font-family:
'Poppins',
sans-serif;

background:
var(--bg);

color:
var(--text);

overflow-x:hidden;

transition:.4s;

}

/* ===================================
   LOADER
=================================== */

#loader{

position:fixed;

inset:0;

background:
#0a0a0a;

display:flex;

justify-content:center;
align-items:center;

flex-direction:column;

z-index:999999;

}

.loader-title{

color:white;

font-size:2rem;

font-weight:700;

margin-bottom:20px;

}

.loader-bar{

width:280px;

height:8px;

border-radius:20px;

background:#222;

overflow:hidden;

}

.loader-progress{

height:100%;

width:0%;

background:
linear-gradient(
90deg,
#6d5dfc,
#8b5cf6
);

animation:
loading 2.5s linear forwards;

}

@keyframes loading{

0%{
width:0%;
}

100%{
width:100%;
}

}

/* ===================================
   NAVBAR
=================================== */

.navbar{

position:sticky;

top:0;

width:100%;

background:
var(--card);

backdrop-filter:
blur(10px);

z-index:999;

border-bottom:
1px solid
var(--border);

}

.nav-container{

max-width:1200px;

margin:auto;

padding:

18px
20px;

display:flex;

justify-content:
space-between;

align-items:center;

}

.logo{

font-size:1.5rem;

font-weight:700;

color:
var(--primary);

}

.nav-actions{

display:flex;

gap:10px;

align-items:center;

}

.theme-btn{

width:60px;

height:34px;

border:none;

border-radius:999px;

cursor:pointer;

background:#ddd;

position:relative;

}

.theme-btn::before{

content:"☀️";

position:absolute;

width:28px;
height:28px;

background:white;

border-radius:50%;

left:3px;
top:3px;

display:flex;

align-items:center;
justify-content:center;

transition:.4s;

}

.dark .theme-btn::before{

content:"🌙";

transform:
translateX(26px);

}

/* ===================================
   CONTAINER
=================================== */

.container{

max-width:1200px;

margin:auto;

padding:

30px
20px;

}
